name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write # required for Trusted Publishing (OIDC)

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: |
          rm -rf dist/ build/ src/*.egg-info
          python -m build
          python -m twine check dist/*

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          retention-days: 1

  publish-testpypi:
    name: Publish to Test PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  verify-testpypi:
    name: Verify Test PyPI Install (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: publish-testpypi
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from Test PyPI with retries
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PACKAGE=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          echo "Verifying $PACKAGE==$VERSION"

          for i in 1 2 3; do
            echo "Attempt $i..."
            if pip install \
              --no-cache-dir \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              ${PACKAGE}==${VERSION}; then
              echo "Install succeeded"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "Install failed after 3 attempts"
              exit 1
            fi
            echo "Retrying in 10 seconds..."
            sleep 10
          done

      - name: Verify import
        run: |
          IMPORT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'].replace('-','_'))")
          python -c "import ${IMPORT}; print('Import OK')"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, verify-testpypi]
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Safety check — no dev versions on main
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Publishing version $VERSION to PyPI"
          if echo "$VERSION" | grep -q "dev"; then
            echo "Dev version cannot be released on main!"
            exit 1
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  post-release-tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create and push git tag
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tagging release v$VERSION"

          git config user.name "ci-bot"
          git config user.email "ci-bot@telekinesis.ai"
          git fetch --tags

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping."
            exit 0
          fi

          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

  post-release-bump-version:
    name: Bump Version on develop
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tomli-w
        run: pip install tomli-w

      - name: Bump patch version on develop
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Current version: $VERSION"

          if echo "$VERSION" | grep -q "dev"; then
            echo "Version should not contain dev suffix!"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping to $NEW_VERSION"

          git config user.name "ci-bot"
          git config user.email "ci-bot@telekinesis.ai"
          git fetch origin develop
          git checkout -B develop origin/develop

          NEW_VER="$NEW_VERSION" python -c "
          import os, tomllib, tomli_w
          data = tomllib.load(open('pyproject.toml', 'rb'))
          data['project']['version'] = os.environ['NEW_VER']
          tomli_w.dump(data, open('pyproject.toml', 'wb'))
          "

          git add pyproject.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin develop