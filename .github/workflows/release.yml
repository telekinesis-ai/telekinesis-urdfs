name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: |
          rm -rf dist/ build/ src/*.egg-info
          python -m build
          python -m twine check dist/*

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          retention-days: 1

  post-release-tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create and push git tag
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tagging release v$VERSION"

          git config user.name "ci-bot"
          git config user.email "ci-bot@telekinesis.ai"
          git fetch --tags

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping."
            exit 0
          fi

          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

  post-release-bump-version:
    name: Bump Version on develop
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tomli-w
        run: pip install tomli-w

      - name: Bump patch version on develop
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Current version: $VERSION"

          if echo "$VERSION" | grep -q "dev"; then
            echo "Version should not contain dev suffix!"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping to $NEW_VERSION"

          git config user.name "ci-bot"
          git config user.email "ci-bot@telekinesis.ai"
          git fetch origin develop
          git checkout -B develop origin/develop

          NEW_VER="$NEW_VERSION" python -c "
          import os, tomllib, tomli_w
          data = tomllib.load(open('pyproject.toml', 'rb'))
          data['project']['version'] = os.environ['NEW_VER']
          tomli_w.dump(data, open('pyproject.toml', 'wb'))
          "

          git add pyproject.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin develop
